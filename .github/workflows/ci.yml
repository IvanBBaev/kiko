name: CI

on:
  push:
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check (build, typecheck, lint, format, tests, coverage ≥85% lines / ≥80% branches / ≥88% functions)
        run: npm run check
      - name: Audit production dependencies (high+)
        run: npm audit --omit=dev --audit-level=high
